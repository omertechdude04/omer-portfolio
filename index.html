<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title + Description -->
    <title>Omer Tech Dude | Front-End Web Developer</title>
    <meta
      name="description"
      content="Omer Tech Dude (Omer Taib) — Front-end web developer building clean, modern, high-performance websites and React apps. View projects, skills, and contact."
    />

    <!-- Canonical (replace with your real domain once live) -->
    <link rel="canonical" href="https://omertechdude.com/" />

    <!-- Indexing -->
    <meta name="robots" content="index,follow,max-image-preview:large" />

    <!-- Keywords (optional, low impact but fine) -->
    <meta
      name="keywords"
      content="Omer Taib, Omer Tech Dude, front-end developer, web developer, React developer, UI developer, portfolio, Tailwind, JavaScript"
    />

    <!-- Theme color -->
    <meta name="theme-color" content="#070812" />

    <!-- Favicons (replace with your own files if you have them) -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Omer Tech Dude" />
    <meta property="og:title" content="Omer Tech Dude | Front-End Web Developer" />
    <meta
      property="og:description"
      content="Front-end web developer building clean, modern, high-performance websites and React apps."
    />
    <meta property="og:url" content="https://omertechdude.com/" />
    <!-- Create this image in /public (recommended 1200x630) -->
    <meta property="og:image" content="https://omertechdude.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Omer Tech Dude | Front-End Web Developer" />
    <meta
      name="twitter:description"
      content="Front-end web developer building clean, modern, high-performance websites and React apps."
    />
    <meta name="twitter:image" content="https://omertechdude.com/og-image.png" />

    <!-- If you want: set your actual favicon instead of Vite -->
    <!-- <link rel="icon" type="image/png" href="/favicon.png" /> -->

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Omer Taib",
        "alternateName": "Omer Tech Dude",
        "jobTitle": "Front-End Web Developer",
        "url": "https://omertechdude.com/",
        "image": "https://omertechdude.com/og-image.png",
        "sameAs": [
          "https://github.com/omertechdude04",
          "https://www.linkedin.com/in/omer-taib-a8aa68358"
        ],
        "knowsAbout": ["React", "JavaScript", "HTML", "CSS", "Tailwind", "UI/UX"]
      }
    </script>
  </head>
